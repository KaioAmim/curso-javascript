<html>
    <body>
        <script>
            
            //Função construtora
            function Pessoa(){
//Elementos do objeto, o nome padrão de todos objetos será Kaio
                this.nome = 'Kaio';
            }

            //Objeto 1
            var pessoa = new Pessoa();
            
            //Objeto 2
            var pessoa2 = new Pessoa();

            pessoa2.nome = 'Amim';
        </script>
    </body>
</html>
