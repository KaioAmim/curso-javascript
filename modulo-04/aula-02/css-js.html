<html>
    <body>
        <div id="box">
                <h1>Manipulando CSS com JavaScript</h1>
                <p>Este é um exemplo de como alterar o estilo de um elemento usando JavaScript.</p>
        </div>

    </body>

    <script> 
        var elemento = document.getElementById("box");
        elemento.style.width = "80%";
        elemento.style.height = "80%";
        elemento.style.margin = "auto";
        elemento.style.backgroundColor = "lightblue";
        elemento.style.display = "flex";
        elemento.style.flexDirection = "column";
        elemento.style.justifyContent = "center";
        elemento.style.alignItems = "center";
    </script>
</html>
