<html>
    <body>
        <script>

            var data = new Date('11/08/2026');
            var data2 = new Date('11/10/2026');

            //diferença em milissegundos por padrão / conversão de milissegundos para dias
            var diferenca = (data2.getTime() - data.getTime()) / (1000 * 3600 * 24);
           alert(diferenca);

        </script>
    </body>
</html>
